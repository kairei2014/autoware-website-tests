name: CI — E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      - name: Install Playwright system dependencies
        run: npx playwright install-deps

      - name: Run tests
        run: npm test

      - name: Upload Playwright report as artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 14

      - name: Upload Playwright traces and test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-test-results
          path: reports/test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Archive Playwright report for Pages
        if: always()
        run: |
          tar \
            --dereference --hard-dereference \
            --directory reports/html \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload Playwright report for Pages
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: test
    if: >-
      always() && (
        github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
      )
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
